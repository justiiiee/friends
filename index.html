<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MiniChat Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;font-family:Inter,sans-serif}body{margin:0;background:linear-gradient(135deg,#0f172a,#1e293b);height:100vh;display:flex;justify-content:center;align-items:center}.app{width:100%;max-width:1100px;height:95vh;background:#fff;border-radius:24px;overflow:hidden;display:flex;box-shadow:0 20px 50px rgba(0,0,0,.35)}.sidebar{width:32%;background:#0f766e;color:#fff;padding:20px;display:flex;flex-direction:column}.chat{flex:1;background:#ecfdf5;display:flex;flex-direction:column}.brand{font-size:24px;font-weight:700}.input,button{width:100%;padding:12px;border:none;border-radius:12px;margin-top:10px}button{background:#14b8a6;color:#fff;font-weight:700;cursor:pointer}.friends{margin-top:20px;overflow:auto}.friend{padding:12px;background:rgba(255,255,255,.12);margin:8px 0;border-radius:12px;cursor:pointer}.messages{flex:1;padding:20px;overflow:auto;display:flex;flex-direction:column}.msg{padding:12px 16px;border-radius:16px;max-width:70%;margin:6px 0}.mine{background:#14b8a6;color:#fff;align-self:flex-end}.other{background:#fff;align-self:flex-start}.composer{display:flex;padding:15px;background:#d1fae5;gap:10px}.composer input{flex:1;padding:14px;border-radius:14px;border:none}.topbar{padding:15px;background:#10b981;color:#fff;font-weight:700;display:flex;justify-content:space-between;align-items:center}@media(max-width:768px){.app{flex-direction:column;height:100vh;border-radius:0}.sidebar{width:100%;height:40%}}
</style>
</head>
<body>
<div class='app'>
<div class='sidebar'>
<div class='brand'>MiniChat Pro</div>
<input id='email' class='input' placeholder='Email'>
<input id='password' class='input' type='password' placeholder='Password'>
<button onclick='signup()'>Sign Up</button>
<button onclick='login()'>Login</button>
<input id='friendEmail' class='input' placeholder='Friend email to chat'>
<button onclick='selectFriend()'>Open Chat</button>
<div class='friends' id='friends'></div>
</div>
<div class='chat'>
<div class='topbar'>
<span id='chatTitle'>Select a friend</span>
<button onclick='logout()' style='width:auto;padding:10px 16px;background:#065f46'>Logout</button>
</div>
<div class='messages' id='messages'></div>
<div class='composer'>
<input id='messageInput' placeholder='Type a message...'>
<button onclick='sendMessage()' style='width:120px'>Send</button>
</div>
</div>
</div>
<script type='module'>
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import { getFirestore, doc, setDoc, addDoc, collection, query, orderBy, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
const firebaseConfig = {
 apiKey:'YOUR_API_KEY',authDomain:'YOUR_PROJECT.firebaseapp.com',projectId:'YOUR_PROJECT_ID',storageBucket:'YOUR_PROJECT.appspot.com',messagingSenderId:'ID',appId:'APP_ID'
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
window.currentFriend='';
window.currentUser='';
window.signup=async()=>{await createUserWithEmailAndPassword(auth,email.value,password.value);alert('Account created');};
window.login=async()=>{const user=await signInWithEmailAndPassword(auth,email.value,password.value);window.currentUser=user.user.email;alert('Logged in');};
window.logout=()=>signOut(auth);
window.selectFriend=()=>{window.currentFriend=friendEmail.value;chatTitle.textContent=window.currentFriend;loadMessages();};
function chatId(){return [window.currentUser,window.currentFriend].sort().join('_');}
window.sendMessage=async()=>{if(!messageInput.value)return;await addDoc(collection(db,'chats',chatId(),'messages'),{text:messageInput.value,sender:window.currentUser,time:Date.now()});messageInput.value='';};
function loadMessages(){messages.innerHTML='';const q=query(collection(db,'chats',chatId(),'messages'),orderBy('time'));onSnapshot(q,snap=>{messages.innerHTML='';snap.forEach(docu=>{const m=docu.data();const div=document.createElement('div');div.className='msg '+(m.sender===window.currentUser?'mine':'other');div.textContent=m.text;messages.appendChild(div);messages.scrollTop=messages.scrollHeight;});});}
</script>
</body>
</html>
